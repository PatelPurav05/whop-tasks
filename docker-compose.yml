services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: whop_tasks
      POSTGRES_USER: whop_tasks
      POSTGRES_PASSWORD: whop_tasks
    ports:
      - "5432:5432"
    volumes:
      - whop_tasks_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whop_tasks -d whop_tasks"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  whop_tasks_postgres:
